name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ansible ansible-lint

      - name: Run ansible-lint
        run: ansible-lint tasks/ defaults/ handlers/ meta/ || true

  validate-meta:
    name: Validate Galaxy metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check galaxy meta
        run: |
          python3 -c "
          import yaml, sys
          with open('meta/main.yml') as f:
              meta = yaml.safe_load(f)
          info = meta.get('galaxy_info', {})
          assert info.get('role_name'), 'role_name missing'
          assert info.get('description'), 'description missing'
          assert len(info.get('galaxy_tags', [])) >= 5, 'need at least 5 tags'
          print('Galaxy metadata OK')
          "

  build-container:
    name: Build & compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - ubuntu2204
          - ubuntu2404
          - ubuntu2604
          - debian12
          - rocky9
          - rocky8
          - oraclelinux8
          - oraclelinux9
          - fedora
    steps:
      - uses: actions/checkout@v4

      # Builds the per-distro Docker image and compiles open-vm-tools inside it,
      # producing the .deb/.rpm. This is the real "does it compile in Docker"
      # gate — a failed image build or compile fails the job for that target.
      - name: Build container and compile open-vm-tools
        working-directory: containers
        run: ./build-all.sh --target ${{ matrix.target }}

      - name: Upload built package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmtools-${{ matrix.target }}
          path: output/${{ matrix.target }}/*
          if-no-files-found: warn
