# Preflight checks: detect current installation state

- name: Check if custom vmtools package is installed
  ansible.builtin.command:
    cmd: "rpm -q {{ vmtools_pkg_name }}"
  register: _rpm_query_custom
  failed_when: false
  changed_when: false

- name: Check if standard open-vm-tools is installed
  ansible.builtin.command:
    cmd: "rpm -q open-vm-tools"
  register: _rpm_query_standard
  failed_when: false
  changed_when: false

- name: Check custom vmtoolsd binary
  ansible.builtin.stat:
    path: "{{ vmtools_prefix }}/bin/vmtoolsd"
  register: vmtoolsd_custom_bin

- name: Detect current installation type
  ansible.builtin.set_fact:
    has_custom_tools: "{{ _rpm_query_custom.rc == 0 }}"
    has_standard_tools: "{{ _rpm_query_standard.rc == 0 and _rpm_query_custom.rc != 0 }}"

- name: Map architecture to package naming
  ansible.builtin.set_fact:
    _pkg_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

# I pacchetti vivono in files/<target>/ dove <target> corrisponde al Dockerfile
# usato per la build (vedi containers/build-all.sh TARGETS). Mappiamo i fact
# Ansible al nome del target.
- name: Map ansible_distribution to build target subdir
  ansible.builtin.set_fact:
    _vmtools_distro_subdir: >-
      {%- if ansible_distribution == 'Ubuntu' -%}
      ubuntu{{ ansible_distribution_version | replace('.', '') }}
      {%- elif ansible_distribution == 'Debian' -%}
      debian{{ ansible_distribution_major_version }}
      {%- elif ansible_distribution in ['Rocky', 'CentOS', 'RedHat', 'AlmaLinux'] -%}
      rocky{{ ansible_distribution_major_version }}
      {%- elif ansible_distribution == 'OracleLinux' -%}
      oraclelinux{{ ansible_distribution_major_version }}
      {%- elif ansible_distribution == 'Fedora' -%}
      fedora
      {%- endif -%}

- name: Resolve effective packages dir (per-distro subdir)
  ansible.builtin.set_fact:
    _vmtools_effective_pkg_dir: "{{ vmtools_packages_dir }}/{{ _vmtools_distro_subdir }}"

- name: Detect package file for this host (Debian)
  ansible.builtin.set_fact:
    vmtools_pkg_file: "{{ lookup('fileglob', _vmtools_effective_pkg_dir ~ '/' ~ vmtools_pkg_name ~ '_*_' ~ _pkg_arch ~ '.deb') }}"
  delegate_to: localhost
  become: false
  when: ansible_os_family == 'Debian'

- name: Detect package file for this host (RedHat)
  ansible.builtin.set_fact:
    vmtools_pkg_file: "{{ lookup('fileglob', _vmtools_effective_pkg_dir ~ '/' ~ vmtools_pkg_name ~ '-*.rpm') }}"
  delegate_to: localhost
  become: false
  when: ansible_os_family == 'RedHat'

- name: Detect package file for this host (Suse)
  ansible.builtin.set_fact:
    vmtools_pkg_file: "{{ lookup('fileglob', _vmtools_effective_pkg_dir ~ '/' ~ vmtools_pkg_name ~ '-*.rpm') }}"
  delegate_to: localhost
  become: false
  when: ansible_os_family == 'Suse'

- name: Fail if no package found for this OS
  ansible.builtin.fail:
    msg: |
      Nessun pacchetto trovato per {{ ansible_distribution }} {{ ansible_distribution_version }}.
      Directory pacchetti attesa: {{ _vmtools_effective_pkg_dir }}
      Esegui prima il build con: cd containers && ./build-all.sh --target {{ _vmtools_distro_subdir }}
  when: vmtools_pkg_file | length == 0

- name: Show current state
  ansible.builtin.debug:
    msg: |
      Host: {{ inventory_hostname }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }} ({{ ansible_os_family }})
      Custom tools installati: {{ has_custom_tools }}
      Standard tools installati: {{ has_standard_tools }}
      Pacchetto da installare: {{ vmtools_pkg_file }}
