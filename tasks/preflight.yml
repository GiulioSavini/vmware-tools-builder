# Preflight checks: detect current installation state

- name: Check if custom vmtools package is installed
  ansible.builtin.command:
    cmd: "rpm -q {{ vmtools_pkg_name }}"
  register: _rpm_query_custom
  failed_when: false
  changed_when: false

- name: Check if standard open-vm-tools is installed
  ansible.builtin.command:
    cmd: "rpm -q open-vm-tools"
  register: _rpm_query_standard
  failed_when: false
  changed_when: false

- name: Check custom vmtoolsd binary
  ansible.builtin.stat:
    path: "{{ vmtools_prefix }}/bin/vmtoolsd"
  register: vmtoolsd_custom_bin

- name: Detect current installation type
  ansible.builtin.set_fact:
    has_custom_tools: "{{ _rpm_query_custom.rc == 0 }}"
    has_standard_tools: "{{ _rpm_query_standard.rc == 0 and _rpm_query_custom.rc != 0 }}"

- name: Map architecture to package naming
  ansible.builtin.set_fact:
    _pkg_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

- name: Detect package file for this host (Debian)
  ansible.builtin.set_fact:
    vmtools_pkg_file: "{{ lookup('fileglob', vmtools_packages_dir ~ '/' ~ vmtools_pkg_name ~ '_*_' ~ _pkg_arch ~ '.deb') }}"
  delegate_to: localhost
  become: false
  when: ansible_os_family == 'Debian'

- name: Detect package file for this host (RedHat)
  vars:
    _rpm_pattern: "{{ vmtools_packages_dir }}/{{ vmtools_pkg_name }}-*{{ ansible_distribution_major_version }}*.rpm"
    _rpm_fallback: "{{ vmtools_packages_dir }}/{{ vmtools_pkg_name }}-*.rpm"
  ansible.builtin.set_fact:
    vmtools_pkg_file: >-
      {{ lookup('fileglob', _rpm_pattern) |
         default(lookup('fileglob', _rpm_fallback), true) }}
  delegate_to: localhost
  become: false
  when: ansible_os_family == 'RedHat'

- name: Detect package file for this host (Suse)
  ansible.builtin.set_fact:
    vmtools_pkg_file: "{{ lookup('fileglob', vmtools_packages_dir ~ '/' ~ vmtools_pkg_name ~ '-*.rpm') }}"
  delegate_to: localhost
  become: false
  when: ansible_os_family == 'Suse'

- name: Fail if no package found for this OS
  ansible.builtin.fail:
    msg: |
      Nessun pacchetto trovato per {{ ansible_distribution }} {{ ansible_distribution_version }}.
      Directory pacchetti: {{ vmtools_packages_dir }}
      Esegui prima il build con: cd containers && ./build-all.sh
  when: vmtools_pkg_file | length == 0

- name: Show current state
  ansible.builtin.debug:
    msg: |
      Host: {{ inventory_hostname }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }} ({{ ansible_os_family }})
      Custom tools installati: {{ has_custom_tools }}
      Standard tools installati: {{ has_standard_tools }}
      Pacchetto da installare: {{ vmtools_pkg_file }}
